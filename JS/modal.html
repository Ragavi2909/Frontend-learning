<html>
    <head>
        <title>Modal</title>
    </head>
    <body>
        
    </body>
    <script>
        //3 types of popup known as "MODAL WINDOW"

        //alert
        alert("This is an alert msg");


        //prompt
        let input;
        input = prompt("Enter your age","18");  //the second is known as "default argument",automically fill be filled and we can change after that
        console.log(input);
        console.log(typeof input);  //stores always as string dt and we can typecast it


        //confirm
        let text;
        text = confirm("Are you a student?");
        console.log(text); //ok gives true;cancel gives false ; gives boolean op



        //if we press ok - it gets value, if you cancel it -> it will give null(empty string)
    </script>
</html>
